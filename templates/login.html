<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Petal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
       .auth-container {
            background: rgba(255, 255, 255, 0.95); padding: 40px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; 
            width: 90%; max-width: 350px; box-sizing: border-box; /* THIS LINE CHANGED */
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
        .auth-container input {
            width: 90%; padding: 15px; margin: 10px 0; border: 2px solid #e0e0e0;
            border-radius: 30px; font-size: 16px; outline: none;
        }
        .auth-container button {
            width: 100%; padding: 15px; margin-top: 15px; background-color: #4CAF50;
            color: white; border: none; border-radius: 30px; font-size: 16px; font-weight: bold; cursor: pointer;
        }
        .error-msg { color: #d32f2f; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="auth-container">
        <h1 style="color: #2e7d32;">Welcome Back</h1>
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="error-msg">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}

        <form method="POST" action="/login">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Log In</button>
        </form>
        <p style="margin-top: 20px;">Don't have an account? <a href="/signup" style="color: #4CAF50;">Sign up</a></p>
    </div>
</body>
</html>
